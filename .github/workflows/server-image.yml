name: Server image

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref or SHA to build
        required: false
        type: string
      image:
        description: Fully-qualified image name without tag
        required: true
        type: string
      tags:
        description: Newline-delimited image tags
        required: true
        type: string
      push:
        description: Whether to push the built image to the registry
        required: false
        default: true
        type: boolean
      platforms:
        description: Target build platforms
        required: false
        default: linux/amd64,linux/arm64
        type: string
    outputs:
      digest:
        description: Published image digest
        value: ${{ jobs.build.outputs.digest }}

jobs:
  build:
    name: Build server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags }}
