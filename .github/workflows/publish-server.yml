name: Publish server artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (format: server-vX.Y.Z)"
        required: true
        type: string
  push:
    tags:
      - "server-v*"

permissions:
  contents: write
  packages: write

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Resolve tag, version, and image name
        id: meta
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [[ ! "$TAG" =~ ^server-v.+$ ]]; then
            echo "Expected tag format: server-vX.Y.Z. Received: $TAG"
            exit 1
          fi

          VERSION="${TAG#server-v}"
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LOWER}/agentlogs"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build standalone binary (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
          - platform: linux
            arch: arm64
          - platform: darwin
            arch: x64
          - platform: darwin
            arch: arm64
          - platform: windows
            arch: x64
          - platform: windows
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts --filter ./packages/shared --filter ./packages/server

      - name: Build standalone binary
        env:
          BUN_BINARY_TARGET: ${{ matrix.platform }}
          BUN_BINARY_ARCH: ${{ matrix.arch }}
        run: bun run --filter ./packages/server build

      - name: Package binary artifact
        run: |
          set -euo pipefail

          SRC="packages/server/dist/agentlogs-server"
          EXT=""
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            SRC="${SRC}.exe"
            EXT=".exe"
          fi

          OUT_DIR="release-assets"
          OUT_NAME="agentlogs-server-${{ needs.meta.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}${EXT}"
          mkdir -p "$OUT_DIR"
          cp "$SRC" "$OUT_DIR/$OUT_NAME"
          chmod +x "$OUT_DIR/$OUT_NAME" || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish-docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.version }}
            ${{ needs.meta.outputs.image }}:latest

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - meta
      - build-binaries
      - publish-docker
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksum files
        run: |
          set -euo pipefail
          cd release-assets

          mapfile -t FILES < <(find . -maxdepth 1 -type f -name 'agentlogs-server-*' -printf '%f\n' | sort)
          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "No binaries found in release-assets"
            exit 1
          fi

          md5sum "${FILES[@]}" > checksums.md5
          sha256sum "${FILES[@]}" > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: AgentLogs server v${{ needs.meta.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/agentlogs-server-*
            release-assets/checksums.md5
            release-assets/checksums.sha256
          body: |
            Published server artifacts for `${{ needs.meta.outputs.tag }}`.

            Docker image:
            - `${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.version }}`
            - `${{ needs.meta.outputs.image }}:latest`

            Checksums:
            - `checksums.md5` (legacy tooling compatibility)
            - `checksums.sha256` (recommended)
